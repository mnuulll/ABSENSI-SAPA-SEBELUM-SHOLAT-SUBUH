<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Absensi Digital</title>
    <link rel="icon" type="image/png" href="https://mnuulll.github.io/ABSENSI-SAPA-SEBELUM-SHOLAT-SUBUH/logo.png">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .logo-tengah { width: 100px; margin-bottom: 20px; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { background: #87CEEB; color: black; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #000080; color: white; }
        .A { font-size: 10px; color: #A9A9A9; margin-top: 15px; }
    </style>
</head>
<body>
    <img src="https://mnuulll.github.io/ABSENSI-SAPA-SEBELUM-SHOLAT-SUBUH/logo.png" alt="Logo Sapa Subuh" class="logo-tengah">
    <div class="box">
        <h2>ABSENSI WALI KELAS SAPA SEBELUM SHOLAT SUBUH</h2>
        <form id="absenForm" action="https://script.google.com/macros/s/AKfycbxoZzUl9sHFj3pk7TBLzfWbxDnlFFhpLROZFH33yNKBGEX-KLzPkOd1yh75QtKmWRtm/exec">
            <select name="Nama" id="nama" required>
              <option value="" disabled selected>-- Pilih Nama --</option>
              <option value="AGNI AULIA RAMADANI">Agni</option>
              <option value="AJENG WARDAH PARADISI">Ajeng</option>
              <option value="AKHMAD KHOYRUL BAROKAH">Khoyrul</option>
              <option value="ANNOVI">Annovi</option>
              <option value="ARIQAH AYU ESTININGTYAS">Ariqah</option>
              <option value="AULIA KASIH">Aulia</option>
              <option value="AZYUMARDI AZRA">Umar</option>
              <option value="DEA DEFRIANA">Dea</option>
              <option value="DINDA KHAERUNNISAH">Dinda</option>
              <option value="ELFIRA SULISTYA">Elfira</option>
              <option value="EYI DAYATI">Eyi</option>
              <option value="FARA FADHILA">Fara</option>
              <option value="FATKIYAH NUR NADIFAH">Diva</option>
              <option value="FENY FEBRIYANTI">Feny</option>
              <option value="GISELA FEBRIYANA PUTRI">Gisel</option>
              <option value="HAIFAH AGHISTY">Haifah</option>
              <option value="HALIMATUS SA'DIYAH">Diyah</option>
              <option value="INTAN AULLIYA AGUSTIN">Intan</option>
              <option value="KHANSA NAYLA SYAFNA">Khansah</option>
              <option value="MAULANA ILHAM">Maulana</option>
              <option value="MEYSI NUR'AENI">Meysi</option>
              <option value="MOHAMAD ADI FAJARUDIN">Fajar</option>
              <option value="MOHAMMAD RIZKY AL HIDAYAH">Nanang</option>
              <option value="MOHAMMAD RIZKY IMANULHAQ">Manul</option>
              <option value="MUHAMMAD HAIZ NURILLAH">Haiz</option>
              <option value="MUNIFAH">Munifah</option>
              <option value="NABILA SAFITRI">Nabila</option>
              <option value="NAUFAL SYAMIL ADZ DZAKI">Opang</option>
              <option value="NAWAF HAZIM ROBANI">Nawaf</option>
              <option value="NIFIN MELANI">Ipin</option>
              <option value="NIKI SENTANA">Niki</option>
              <option value="RIYADIN FARID">Farid</option>
              <option value="ROYAN FADILLAH RAHMAN">Royan</option>
              <option value="SRI NOVIANI">Opi</option>
              <option value="SRIYANI">Yani</option>
              <option value="TEGAR PRIYANGGA RACHMAN">Tegar</option>
              <option value="ZAHRATUSYITA HUSAIN NARU">Zahra</option>
            </select>
            <button type="submit" id="btnKirim">Kirim Absen</button>
        </form>
        <p id="pesan" style="color: green; font-weight: bold; margin-top: 15px;"></p>
        <div class="A">Create by Mnuulll</div>
    </div>

    <script>
        const form = document.getElementById('absenForm');
        const pesan = document.getElementById('pesan');
        const tombol = document.getElementById('btnKirim');
        const elemenDropdown = document.getElementById("nama");
        const urlAppsScript = "https://script.google.com/macros/s/AKfycbxoZzUl9sHFj3pk7TBLzfWbxDnlFFhpLROZFH33yNKBGEX-KLzPkOd1yh75QtKmWRtm/exec";

        window.onload = function() {
            cekSiapaSudahAbsen();
        };

        function cekSiapaSudahAbsen() {
            elemenDropdown.options[0].text = "⏳ Sedang mengecek data absen...";
            elemenDropdown.disabled = true;

            fetch(urlAppsScript, { method: "GET", redirect: "follow" })
                .then(response => response.json())
                .then(daftarAbsen => {
                    elemenDropdown.disabled = false;
                    elemenDropdown.options[0].text = "-- Pilih Nama --";

                    for (var i = 0; i < elemenDropdown.options.length; i++) {
                        var opsi = elemenDropdown.options[i];
                        
                        if (daftarAbsen.includes(opsi.value)) {
                            kunciOpsi(opsi);
                        }
                    }
                })
                .catch(error => {
                    console.error("Gagal mengecek data:", error);
                    elemenDropdown.disabled = false;
                    elemenDropdown.options[0].text = "-- Pilih Nama --";
                });
        }

        function kunciOpsi(opsi) {
            opsi.disabled = true;
            opsi.style.backgroundColor = "#37de69";
            opsi.style.color = "#888888";
            // Agar tulisannya jadi "Nifin (✔ Sudah Absen)"
            if (!opsi.text.includes("(✔ Sudah Absen)")) {
                opsi.text = opsi.text + " (✔ Sudah Absen)";
            }
        }

        form.addEventListener('submit', e => {
            e.preventDefault();
            tombol.disabled = true;
            tombol.innerText = "Mengirim...";
            
            const opsiTerpilih = elemenDropdown.options[elemenDropdown.selectedIndex];
            
            fetch(form.action, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    pesan.innerText = "Absen berhasil tersimpan otomatis!";
                    
                    kunciOpsi(opsiTerpilih);
                    
                    elemenDropdown.value = "";
                    tombol.disabled = false;
                    tombol.innerText = "Kirim Absen";
                })
                .catch(error => {
                    pesan.innerText = "Gagal mengirim data. Coba lagi!";
                    tombol.disabled = false;
                    tombol.innerText = "Kirim Absen";
                });
        });
    </script>

</body>
</html>
