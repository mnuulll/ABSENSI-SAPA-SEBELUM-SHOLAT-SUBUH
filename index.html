<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Absensi Digital</title>
    <link rel="icon" type="image/png" href="https://mnuulll.github.io/ABSENSI-SAPA-SEBELUM-SHOLAT-SUBUH/logo.png">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .logo-tengah { width: 100px; margin-bottom: 20px; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { background: #87CEEB; color: black; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #000080; color: white; }
        .A { font-size: 10px; color: #A9A9A9; margin-top: 15px; }
    </style>
</head>
<body>
    <img src="https://mnuulll.github.io/ABSENSI-SAPA-SEBELUM-SHOLAT-SUBUH/logo.png" alt="Logo Sapa Subuh" class="logo-tengah">
    <div class="box">
        <h2>ABSENSI WALI KELAS SAPA SEBELUM SHOLAT SUBUH</h2>
        <form id="absenForm" action="https://script.google.com/macros/s/AKfycbxoZzUl9sHFj3pk7TBLzfWbxDnlFFhpLROZFH33yNKBGEX-KLzPkOd1yh75QtKmWRtm/exec">
            <select name="Nama" id="nama" required>
              <option value="" disabled selected>-- Pilih Nama --</option>
              <option value="MOHAMMAD RIZKY IMANULHAQ">Manul</option>
              <option value="NIFIN MELANI">Nifin</option>
              <option value="NAWAF HAZIM ROBANI">Nawaf</option>
            </select>
            <button type="submit" id="btnKirim">Kirim Absen</button>
        </form>
        <p id="pesan" style="color: green; font-weight: bold; margin-top: 15px;"></p>
        <div class="A">Create by Mnuulll</div>
    </div>

    <script>
        const form = document.getElementById('absenForm');
        const pesan = document.getElementById('pesan');
        const tombol = document.getElementById('btnKirim');

        form.addEventListener('submit', e => {
            e.preventDefault();
            tombol.disabled = true;
            tombol.innerText = "Mengirim...";
            
            fetch(form.action, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    pesan.innerText = "Absen berhasil tersimpan otomatis!";
                    form.reset();
                    tombol.disabled = false;
                    tombol.innerText = "Kirim Absen";
                })
                .catch(error => {
                    pesan.innerText = "Gagal mengirim data. Coba lagi!";
                    tombol.disabled = false;
                    tombol.innerText = "Kirim Absen";
                });
        });
    </script>

</body>
</html>
